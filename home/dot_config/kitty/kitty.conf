# ── Font & Rendering ─────────────────────────────────────────────
# Nerd Font variant gives you ligatures + icons for tools like starship, lsd, etc.
font_family      JetBrainsMono Nerd Font
font_size        13.0

# Add vertical breathing room between lines (percentage of cell height)
modify_font      cell_height 120%

# Use platform-native text rendering for sharper glyphs
text_composition_strategy platform

# ── Window & Layout ──────────────────────────────────────────────
# Padding (in pts) between the terminal content and the window edge
window_padding_width 8

# Available tiling layouts when you cycle with ctrl+shift+l
# tall: one big pane + stacked small panes (like a tiling WM)
# stack: single fullscreen pane (use as "zoom" toggle)
# grid: equal-sized grid of panes
enabled_layouts splits,tall,stack,grid

# ── Tabs ─────────────────────────────────────────────────────────
# New tabs start in the same directory as the current tab
map ctrl+shift+t launch --cwd=current --type=tab

# Powerline-styled tab bar at the bottom
tab_bar_style powerline

# Always show the tab bar (even with a single tab) so session colors are visible
tab_bar_min_tabs 1

# Show tab index number + title for quick navigation
tab_title_template "{index}: {title}"

# ── Scrollback ───────────────────────────────────────────────────
# Number of lines kept in memory per window
scrollback_lines 10000

# Extra MB of scrollback available when opening the pager (ctrl+shift+h)
scrollback_pager_history_size 100

# kitty-scrollback.nvim — browse scrollback in nvim with full vim motions
action_alias kitty_scrollback_nvim kitten ~/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py
map kitty_mod+h kitty_scrollback_nvim
map kitty_mod+g kitty_scrollback_nvim --config ksb_builtin_last_cmd_output
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output

# ── Notifications ────────────────────────────────────────────────
# Suppress Claude Code's OSC 99 desktop notifications — the custom
# notify.sh hook (via D-Bus) provides richer notifications with
# click-to-focus and auto-dismiss, so kitty's built-in ones are duplicates.
filter_notification title:"Claude Code"

# ── Performance ──────────────────────────────────────────────────
# Lower repaint delay (ms) = smoother screen updates (default 10)
repaint_delay 6

# Lower input delay (ms) = snappier keystroke processing (default 3)
input_delay 1

# ── Shell Integration ────────────────────────────────────────────
# Marks prompts so you can jump between them (ctrl+shift+z / ctrl+shift+x),
# click file paths from ls output, and see command exit status
shell_integration enabled

# ── Remote Control ───────────────────────────────────────────────
# Allow scripting kitty only via the unix socket (not the TTY)
allow_remote_control socket-only

# Abstract unix socket — no filesystem path to race/symlink-attack,
# auto-cleaned on exit, one per instance
listen_on unix:@kitty-{kitty_pid}

# ── Background ───────────────────────────────────────────────────
# Transparency (1.0 = fully opaque, 0.0 = fully transparent)
background_opacity 1.0

# Allow changing opacity at runtime with ctrl+shift+a > l / ctrl+shift+a > m
dynamic_background_opacity yes

# ── Key Bindings ─────────────────────────────────────────────────
# Open a new split pane in the current tab (uses enabled_layouts for tiling)
map ctrl+shift+enter launch --cwd=current --location=split

# Toggle "zoom" on current pane (switches to stack layout and back)
map ctrl+shift+z toggle_layout stack

# Jump to tab by number with alt+N
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5

# Pick a file path from visible terminal output and insert it at the cursor
map ctrl+shift+p>f kitten hints --type path --program -

# Pick a URL from visible terminal output and open it in the browser
map ctrl+shift+p>u kitten hints --type url

# BEGIN_KITTY_THEME
# Adventure Time
include current-theme.conf
# END_KITTY_THEME
