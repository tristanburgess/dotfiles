# в”Җв”Җ Prompt Layout в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
format = """
$directory\
${custom.jj}\
${custom.git}\
$kubernetes\
$cmd_duration\
$line_break\
${custom.jj_desc}\
$golang$nodejs$python$rust$terraform\
$character"""

add_newline = false
command_timeout = 2000

# в”Җв”Җ Character в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[character]
success_symbol = "[вқҜ](bold green)"
error_symbol = "[вқҜ](bold red)"

# в”Җв”Җ Directory в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[directory]
truncation_length = 4
truncate_to_repo = false
style = "bold cyan"
repo_root_style = "bold cyan underline"
repo_root_format = "[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

# в”Җв”Җ Jujutsu в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Line 1: change ID, nearest ancestor bookmark, diff stats (ANSI-colored)
# Wraps to its own line if it would overflow terminal width
# All jj calls run in parallel for speed on large repos
[custom.jj]
command = '''
G=$'\033[38;2;31;136;61m'    # green (branch)
BR=$'\033[1;38;2;255;80;80m' # bold red ([!], deletions)
BG=$'\033[1;38;2;80;220;80m' # bold green (additions)
P=$'\033[1;35m'              # bold purple (symbol)
R=$'\033[0m'

# Run all jj calls in parallel via background processes
tmpdir=$(mktemp -d)
trap 'rm -rf "$tmpdir"' EXIT

# Combined: change ID + bookmarks (single call instead of two)
jj --ignore-working-copy log -r @ --no-graph \
  -T 'change_id.shortest() ++ "\n" ++ local_bookmarks.join(" ")' \
  > "$tmpdir/at" 2>/dev/null &

# Ancestor bookmark (@ is on top of this)
jj --ignore-working-copy log -r 'latest(ancestors(@-) & (trunk() | bookmarks()))' --no-graph \
  -T 'if(local_bookmarks, local_bookmarks.join(" "), remote_bookmarks.map(|ref| ref.name()).join(" "))' \
  > "$tmpdir/base" 2>/dev/null &

# Descendant bookmark (@ is behind this вҖ” fallback when no ancestor bookmark found)
jj --ignore-working-copy log -r 'latest(heads(bookmarks() & @-::) ~ @)' --no-graph \
  -T 'if(local_bookmarks, local_bookmarks.join(" "), remote_bookmarks.map(|ref| ref.name()).join(" "))' \
  > "$tmpdir/desc" 2>/dev/null &

# Diff stats (takes working-copy lock)
jj diff --stat > "$tmpdir/stats" 2>/dev/null &

wait

# Parse parallel results
change_id=$(head -1 "$tmpdir/at")
[ -z "$change_id" ] && exit 1
bookmarks=$(sed -n '2p' "$tmpdir/at")
id="$change_id"
[ -n "$bookmarks" ] && id="$id $bookmarks"
base=$(cat "$tmpdir/base")
[ -z "$base" ] && base=$(cat "$tmpdir/desc")
stats=$(tail -1 "$tmpdir/stats")

# Don't show "on X" when X is already the current bookmark
[ "$base" = "$bookmarks" ] && base=""

out="${P} ${R}${G}${id}${R}"
[ -n "$base" ] && out="${out}${G} on ${base}${R}"

files=$(echo "$stats" | grep -oP '\d+(?= file)'); files=${files:-0}
if [ "$files" -gt 0 ] 2>/dev/null; then
  ins=$(echo "$stats" | grep -oP '\d+(?= insertion)'); ins=${ins:-0}
  del=$(echo "$stats" | grep -oP '\d+(?= deletion)'); del=${del:-0}
  out="${out} ${BR}[!]${R}"
  [ "$ins" -gt 0 ] && out="${out} ${BG}+${ins}${R}"
  [ "$del" -gt 0 ] && out="${out} ${BR}-${del}${R}"
  out="${out} *${files}"
fi

# Wrap to new line if directory + vcs info overflows terminal.
# Starship trims command output, so prefix with a zero-width space (U+200B)
# to prevent the leading newline from being stripped.
cols=$(tput cols 2>/dev/null || echo "${COLUMNS:-80}")
dir="${PWD/#$HOME/\~}"
visible=${#id}
[ -n "$base" ] && visible=$((visible + ${#base} + 4))  # " on "
[ "$files" -gt 0 ] 2>/dev/null && visible=$((visible + ${#ins} + ${#del} + ${#files} + 10))
if [ $((${#dir} + visible + 6)) -gt "$cols" ]; then
  printf '\xe2\x80\x8b\n%s' "$out"
else
  printf '%s' "$out"
fi
'''
detect_folders = [".jj"]
ignore_timeout = true
format = "($output )"

# Line 2: change description
[custom.jj_desc]
command = '''jj --ignore-working-copy log -r @ --no-graph -T 'if(description, description.first_line().substr(0, 120), "(no description set, use `jj describe`)")' 2>/dev/null'''
detect_folders = [".jj"]
ignore_timeout = true
style = "italic 248"
format = "[$output]($style)\n"

# в”Җв”Җ Git (non-jj repos only) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[custom.git]
command = '''
jj root >/dev/null 2>&1 && exit 0
branch=$(git branch --show-current 2>/dev/null)
[ -z "$branch" ] && branch=$(git rev-parse --short HEAD 2>/dev/null)
printf ' %s' "$branch"
stats=$(git diff --numstat HEAD 2>/dev/null)
if [ -n "$stats" ]; then
  ins=0; del=0; files=0
  while IFS=$'\t' read -r a d _; do
    [ "$a" != "-" ] && ins=$((ins + a))
    [ "$d" != "-" ] && del=$((del + d))
    files=$((files + 1))
  done <<< "$stats"
  printf ' [!]'
  [ "$ins" -gt 0 ] && printf ' +%s' "$ins"
  [ "$del" -gt 0 ] && printf ' -%s' "$del"
  [ "$files" -gt 0 ] && printf ' *%s' "$files"
fi
true
'''
detect_folders = [".git"]
style = "bold purple"
format = "([$output]($style) )"

# в”Җв”Җ Kubernetes в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[kubernetes]
disabled = false
symbol = "вҳё "
style = "bold blue"
format = '[$symbol$context(/$namespace)]($style) '

# в”Җв”Җ Languages в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[golang]
symbol = " "
style = "bold cyan"
format = "[Go $symbol$version]($style)\n"

[nodejs]
symbol = " "
style = "bold green"
format = "[Node $symbol$version]($style)\n"

[python]
symbol = " "
style = "bold yellow"
format = "[Python $symbol$version]($style)\n"

[rust]
symbol = " "
style = "bold red"
format = "[Rust $symbol$version]($style)\n"

[terraform]
symbol = "уұҒў "
style = "bold 105"
format = "[Terraform $symbol$version($workspace)]($style)\n"

# в”Җв”Җ Command Duration в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[cmd_duration]
min_time = 3000
style = "bold yellow"
format = "[took $duration]($style) "
