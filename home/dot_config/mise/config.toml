[tools]
# ── Cross-platform (Linux + Windows via mise) ──
# renovate: bun
bun = "1.3.13"
# renovate: packageName=@anthropic-ai/claude-code datasource=npm
claude-code = "2.1.131"
# renovate: packageName=@musistudio/claude-code-router datasource=npm
"npm:@musistudio/claude-code-router" = "latest"
# renovate: packageName=duckduckgo-mcp-server datasource=npm
"npm:duckduckgo-mcp-server" = "latest"
# renovate: packageName=Wilfred/difftastic datasource=github-releases
difftastic = "0.69.0"
# renovate: packageName=cli/cli datasource=github-releases
gh = "2.92.0"
# renovate: packageName=googleworkspace/cli datasource=github-releases
"github:googleworkspace/cli" = "0.22.5"
# renovate: go
go = { version = "1.26.2", os = ["linux"] }
# renovate: packageName=golangci/golangci-lint datasource=github-releases
golangci-lint = { version = "2.12.0", os = ["linux"] }
java = { version = "temurin-25.0.3+9.0.LTS", os = ["linux"] }
# renovate: jq
jq = "1.8.1"
# renovate: packageName=jj-vcs/jj datasource=github-releases
jujutsu = "0.40.0"
# renovate: packageName=neovim/neovim datasource=github-releases
neovim = "0.12.2"
node = "lts"
# renovate: packageName=rust-lang/rust datasource=github-releases
rust = "1.95.0"
# renovate: packageName=starship/starship datasource=github-releases
starship = "1.25.1"
# renovate: packageName=astral-sh/uv datasource=github-releases
uv = "0.11.8"
# renovate: packageName=hashicorp/terraform datasource=github-releases
terraform = { version = "1.15.1", os = ["linux"] }
# renovate: packageName=ajeetdsouza/zoxide datasource=github-releases
zoxide = "0.9.9"

# ── Linux only ──
# Chezmoi: bootstrapped by winget on Windows before mise exists
# renovate: packageName=twpayne/chezmoi datasource=github-releases
chezmoi = { version = "2.70.2", os = ["linux"] }
# Kubernetes / local dev
# renovate: packageName=kubernetes/kubernetes datasource=github-releases
kubectl = { version = "1.36.0", os = ["linux"] }
# renovate: packageName=helm/helm datasource=github-releases
helm = { version = "4.1.4", os = ["linux"] }
# renovate: packageName=k3d-io/k3d datasource=github-releases
k3d = { version = "5.8.3", os = ["linux"] }
# renovate: packageName=grafana/tanka datasource=github-releases
tanka = { version = "0.37.0", os = ["linux"] }
# renovate: packageName=jsonnet-bundler/jsonnet-bundler datasource=github-releases
jb = { version = "0.6.0", os = ["linux"] }
# renovate: packageName=google/go-jsonnet datasource=github-releases
go-jsonnet = { version = "0.22.0", os = ["linux"] }
# Cloud CLIs: installed via winget on Windows
# renovate: packageName=aws/aws-cli datasource=github-releases
awscli = { version = "2.34.42", os = ["linux"] }
# renovate: packageName=azure-cli datasource=pypi
azure-cli = { version = "2.85.0", os = ["linux"] }
# renovate: gcloud
gcloud = { version = "564.0.0", os = ["linux"] }

