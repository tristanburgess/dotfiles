[tools]
# ── Cross-platform (Linux + Windows via mise) ──
# renovate: bun
bun = "1.3.13"
# renovate: packageName=@anthropic-ai/claude-code datasource=npm
claude-code = "2.1.116"
# renovate: packageName=Wilfred/difftastic datasource=github-releases
difftastic = "0.68.0"
# renovate: packageName=cli/cli datasource=github-releases
gh = "2.91.0"
# renovate: go
go = "1.26.2"
java = "temurin-25.0.2+10.0.LTS"
# renovate: jq
jq = "1.8.1"
# renovate: packageName=jj-vcs/jj datasource=github-releases
jujutsu = "0.40.0"
# renovate: packageName=neovim/neovim datasource=github-releases
neovim = "0.12.1"
node = "lts"
# renovate: packageName=rust-lang/rust datasource=github-releases
rust = "1.95.0"
# renovate: packageName=starship/starship datasource=github-releases
starship = "1.25.0"
# renovate: packageName=astral-sh/uv datasource=github-releases
uv = "0.11.7"
# renovate: packageName=hashicorp/terraform datasource=github-releases
terraform = "1.14.9"
# renovate: packageName=ajeetdsouza/zoxide datasource=github-releases
zoxide = "0.9.9"

# ── Linux only ──
# Chezmoi: bootstrapped by winget on Windows before mise exists
# renovate: packageName=twpayne/chezmoi datasource=github-releases
chezmoi = { version = "2.70.2", os = ["linux"] }
# Kitty: no Windows build (runs in WSL via WSLg)
# renovate: packageName=kovidgoyal/kitty datasource=github-releases
kitty = { version = "0.46.2", os = ["linux"] }
# Cloud CLIs: installed via winget on Windows
# renovate: packageName=aws/aws-cli datasource=github-releases
awscli = { version = "2.34.36", os = ["linux"] }
# renovate: packageName=azure-cli datasource=pypi
azure-cli = { version = "2.85.0", os = ["linux"] }
# renovate: gcloud
gcloud = { version = "564.0.0", os = ["linux"] }

[tool_alias]
kitty = "github:kovidgoyal/kitty"
